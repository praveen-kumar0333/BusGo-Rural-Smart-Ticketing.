<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BusGo Rural</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { background: #070d1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }</style>
</head>
<body>
    <div id="root">Loading BusGo System...</div>

    <script type="text/babel" src="App.jsx"></script>

    <script type="text/babel">
        // This checks if the 'App' component from your file is ready
        const interval = setInterval(() => {
            if (typeof App !== 'undefined') {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
                clearInterval(interval);
            }
        }, 100);
    </script>
</body>
</html>
